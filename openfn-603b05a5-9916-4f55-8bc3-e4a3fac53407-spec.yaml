      Assess-eligibility-with-common:
        name: Assess eligibility with common
        adaptor: '@openfn/language-gemini@1.0.4'
        credential: null
        body: |
          fn(state => {
            const { mother_age, household_income } = state.data;

            // Define eligibility criteria
            const MIN_MOTHER_AGE = 18;
            const MAX_HOUSEHOLD_INCOME = 50000;

            const isEligible =
              mother_age >= MIN_MOTHER_AGE &&
              household_income <= MAX_HOUSEHOLD_INCOME;

            return {
              ...state,
              data: {
                ...state.data,
                eligibility: isEligible,
              },
            };
          });
      Enroll-in-OpenSPP:
        name: Enroll in OpenSPP
        adaptor: '@openfn/language-salesforce@9.0.8'
        credential: null
        body: |
