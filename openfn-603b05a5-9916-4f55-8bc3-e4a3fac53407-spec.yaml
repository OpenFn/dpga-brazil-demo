        name: Send enrollment SMS
        adaptor: '@openfn/language-twilio@1.0.13'
        credential: null
        body: |
          // Add operations here
    triggers:
      cron:
        type: cron
        cron_expression: '0 8 * * *'
        enabled: false
    edges:
      cron->Fetch-birth-events-from-OpenCRVS:
        source_trigger: cron
        target_job: Fetch-birth-events-from-OpenCRVS
        condition_type: always
        enabled: true
      Fetch-birth-events-from-OpenCRVS->Assess-eligibility-with-common:
        source_job: Fetch-birth-events-from-OpenCRVS
        target_job: Assess-eligibility-with-common
        condition_type: on_job_success
        enabled: true
      Assess-eligibility-with-common->Enroll-in-OpenSPP:
        source_job: Assess-eligibility-with-common
        target_job: Enroll-in-OpenSPP
        condition_type: js_expression
        condition_label: null
        condition_expression: |
          state.eligible === true
        enabled: true
